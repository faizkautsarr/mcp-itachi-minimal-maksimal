services:
  - type: web
    name: mcp-itachi-minimal-maksimal
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: BASE_URL
        value: https://mcp-itachi-minimal-maksimal.onrender.com
